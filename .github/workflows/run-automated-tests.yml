name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16.3-alpine
        env:
          POSTGRES_DB: test_researchhub
          POSTGRES_USER: rh_developer
          POSTGRES_PASSWORD: not_secure
          DB_PORT: 5432
          DB_HOST: localhost
          DB_USER: rh_developer
          DB_PASS: not_secure
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      opensearch:
        image: opensearchproject/opensearch:2.19.3
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
        ports:
          - 9200:9200

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Run Tests
        env:
          APP_ENV: test
          COVERAGE_PROCESS_START: ../pyproject.toml
        working-directory: ./src
        run: |
          cp config/ci/* config
          uv run python manage.py migrate
          uv run python manage.py collectstatic --noinput
          uv run python manage.py opensearch index rebuild --force
          uv run coverage run manage.py test --keepdb --verbosity=2 --parallel auto
          uv run coverage combine
          uv run coverage xml -o coverage.xml

      - name: Upload Coverage Report to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./src/coverage.xml
