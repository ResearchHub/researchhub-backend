name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16.3-alpine
        env:
          POSTGRES_DB: test_researchhub
          POSTGRES_USER: rh_developer
          POSTGRES_PASSWORD: not_secure
          DB_PORT: 5432
          DB_HOST: localhost
          DB_USER: rh_developer
          DB_PASS: not_secure
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      opensearch:
        image: opensearchproject/opensearch:2.19.3
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
        ports:
          - 9200:9200

    steps:
      - name: Check out sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Run Formatter
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          src: "./src"
          args: "format --check --diff"

      - name: Run Linter
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          src: "./src"

      - name: Run Tests
        env:
          APP_ENV: test
          COVERAGE_PROCESS_START: ../pyproject.toml
        working-directory: ./src
        run: |
          cp config/ci/* config
          uv run python manage.py migrate
          uv run python manage.py collectstatic --noinput
          uv run python manage.py opensearch index rebuild --force
          uv run coverage run manage.py test --keepdb --verbosity=2 --parallel auto
          uv run coverage combine
          uv run coverage xml -o coverage.xml

      - name: Upload Coverage Report to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./src/coverage.xml
