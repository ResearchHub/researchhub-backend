name: Claude Code

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only allow org owners/members to trigger — not external contributors
    if: |
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.issue.author_association == 'OWNER' ||
        github.event.issue.author_association == 'MEMBER'
      ) && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16.3-alpine
        env:
          POSTGRES_DB: researchhub
          POSTGRES_USER: rh_developer
          POSTGRES_PASSWORD: not_secure
          DB_PORT: 5432
          DB_HOST: localhost
          DB_USER: rh_developer
          DB_PASS: not_secure
          APP_ENV: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      opensearch:
        image: opensearchproject/opensearch:2.19.3
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
        ports:
          - 9200:9200

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Prepare test environment
        working-directory: ./src
        run: |
          cp config/ci/* config
          uv run python manage.py migrate
          uv run python manage.py collectstatic --noinput
          uv run python manage.py opensearch index rebuild --force

      - uses: anthropics/claude-code-action@ef50f123a3a9be95b60040d042717517407c7256 # v1.0.110
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: "--model claude-opus-4-6 --max-turns 30 --allowedTools 'Edit,Read,Write,Glob,Grep,Bash(cd src && uv run python manage.py test:*),Bash(cd src && uv run python manage.py migrate:*),Bash(cd src && uv run python manage.py makemigrations:*),Bash(cd src && uv run python manage.py collectstatic:*),Bash(cd src && uv run python manage.py opensearch:*),Bash(cd src && uv run flake8:*),Bash(cd src && uv run black:*),Bash(git:*),Bash(gh:*),Bash(ls:*),Bash(pwd:*),Bash(cat:*),Bash(find:*),Bash(echo:*),Bash(uv:*)'"
